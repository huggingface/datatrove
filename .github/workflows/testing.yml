name: Test & Check Code Quality

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_call:

jobs:
  check_code_quality:
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install uv
          uv sync --extra quality
      - name: Check quality
        run: |
          uv run ruff check tests src examples # linter
          uv run ruff format --check tests src examples # formatter

  test:
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install uv
          uv sync --extra testing
          .venv/bin/python -m nltk.downloader punkt
      - name: Test with pytest
        env:
          PYTHONFAULTHANDLER: 1
        run: |
          # Avoid `uv run` here: Ray workers inherit the launcher and try to recreate
          # an env from project metadata, which drops the testing extras and breaks imports.
          .venv/bin/python -m pytest -sv ./tests/
