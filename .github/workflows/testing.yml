name: Test & Check Code Quality

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_call:

jobs:
  check_code_quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install uv
          uv pip install --system .[quality]
      - name: Check quality
        run: |
          ruff check tests src examples # linter
          ruff format --check tests src examples # formatter

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install uv
          # Some optional extras (multilingual, inference) have C-extension deps
          # without Python 3.14 wheels yet (e.g. tensorflow, vllm). Install a
          # reduced set on 3.14 and the full testing extra on older versions.
          if python -c "import sys; sys.exit(0 if sys.version_info >= (3, 14) else 1)"; then
            uv pip install --system ".[cli,io,processing,s3,ray,decont,quality]" \
              flask pytest pytest-rerunfailures pytest-timeout pytest-xdist "moto[s3,server]"
          else
            uv pip install --system .[testing]
          fi
          python -m nltk.downloader punkt
      - name: Test with pytest
        env:
          PYTHONFAULTHANDLER: 1
        run: |
          python -m pytest -sv ./tests/
